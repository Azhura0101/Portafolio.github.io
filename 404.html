<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080810">
    <title>404 — Azhura.dev</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #080810;
            color: #e8e0ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
        }
        .error-code {
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        .error-desc {
            color: #9b8cc0;
            margin-bottom: 2rem;
            max-width: 400px;
        }
        .error-link {
            display: inline-block;
            padding: 0.85rem 2rem;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            color: #fff;
            text-decoration: none;
            border-radius: 999px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .error-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(167, 139, 250, 0.4);
        }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <h1 class="error-title">Página no encontrada</h1>
    <p class="error-desc">Parece que esta página no existe o fue movida. ¡Pero tranquilo, hay mucho más que explorar!</p>
    <a href="/" class="error-link">Volver al inicio</a>
</body>
</html>
